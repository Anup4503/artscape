{% extends 'shop/base.html' %}
{% load static %}

{% block title %}Set New Password | Art-Scape Studio{% endblock %}

{% block extra_css %}
<style>
    .auth-box {
        max-width: 480px;
        margin: 40px auto;
        padding: 40px;
    }
    
    .auth-title {
        text-align: center;
        margin-bottom: 24px;
        font-size: 26px;
        font-weight: 700;
    }
    
    label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-sub);
        display: block;
        margin-bottom: 6px;
    }
    
    input[type="password"] {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 12px 16px;
        color: #ffffff;
        font-size: 14px;
        margin-bottom: 16px;
        transition: var(--transition-smooth);
        font-family: var(--font-body);
    }
    
    input[type="password"]:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.06);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-box glass-panel">
    <h2 class="auth-title">Set New Password</h2>
    <p style="text-align: center; color: var(--text-sub); font-size:14px; margin-bottom: 30px;">
        Choose a secure password of at least 6 characters.
    </p>
    
    <form method="POST" action="{% url 'reset_password' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" name="password" id="password" minlength="6" placeholder="Enter new password" required>
        </div>
        
        <div class="form-group" style="margin-top: 15px;">
            <label for="password_confirm">Confirm New Password</label>
            <input type="password" name="password_confirm" id="password_confirm" minlength="6" placeholder="Re-enter to confirm" required>
        </div>
        
        <button type="submit" class="glow-btn" style="width: 100%; padding:12px; margin-top:24px; font-size:15px;">
            Change Password
        </button>
    </form>
</div>
{% endblock %}
